[dmenu]
dmenu_command = rofi -dmenu -i -theme ~/.config/polybar/shapes/scripts/rofi/networkmenu.rasi
active_chars = ==
highlight = True
highlight_fg =
highlight_bg =
highlight_bold = True
compact = False
wifi_icons = 󰤯󰤟󰤢󰤥󰤨
format = {name:<{max_len_name}s}  {sec:<{max_len_sec}s} {icon:>4}
list_saved = False
prompt = Networks

[dmenu_passphrase]
obscure = False
obscure_color = #1e1e2e

[editor]
terminal = kitty
gui_if_available = True
gui = nm-connection-editor

[nmdm]
rescan_delay = 5
