[global/wm]
include-file = ~/.config/polybar/mocha.ini

[colors]
#background = #282A2E
#foreground = #C5C8C6
#primary = #F0C674
#alert = #A54242
#disabled = #707880
background = ${colors.base}
foreground = ${colors.text}
primary = ${colors.lavender}
alert = ${colors.red}
disabled = ${colors.subtext0}

[bar/main]
width = 100%
height = 40
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 0pt
padding-left = 0
padding-right = 1
module-margin = 1

# If your system does not have 'monospace' mapped, the bar will not launch.
font-0 = JetBrainsMonoNF:size=10;2

modules-left = xworkspaces
modules-center = date
modules-right = systray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.green}
