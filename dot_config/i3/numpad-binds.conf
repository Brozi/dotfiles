# Switch to workspace

bindsym $mod+$numlock+KP_1 workspace $ws1
bindsym $mod+$numlock+KP_2 workspace $ws2
bindsym $mod+$numlock+KP_3 workspace $ws3
bindsym $mod+$numlock+KP_4 workspace $ws4
bindsym $mod+$numlock+KP_5 workspace $ws5

bindsym $mod+KP_End workspace $ws1
bindsym $mod+KP_Down workspace $ws2
bindsym $mod+KP_Next workspace $ws3
bindsym $mod+KP_Left workspace $ws4
bindsym $mod+KP_Begin workspace $ws5

# Switch to workspace on the side monitor

bindsym $mod+$numlock+Mod1+KP_1 workspace $ws6
bindsym $mod+$numlock+Mod1+KP_2 workspace $ws7
bindsym $mod+$numlock+Mod1+KP_3 workspace $ws8
bindsym $mod+$numlock+Mod1+KP_4 workspace $ws9
bindsym $mod+$numlock+Mod1+KP_5 workspace $ws10

bindsym $mod+Mod1+KP_End workspace $ws6
bindsym $mod+Mod1+KP_Down workspace $ws7
bindsym $mod+Mod1+KP_Next workspace $ws8
bindsym $mod+Mod1+KP_Left workspace $ws9
bindsym $mod+Mod1+KP_Begin workspace $ws10

# Move focused container to workspace on the main monitor

bindsym $mod+Shift+KP_End move container to workspace $ws1
bindsym $mod+Shift+KP_Down move container to workspace $ws2
bindsym $mod+Shift+KP_Next move container to workspace $ws3
bindsym $mod+Shift+KP_Left move container to workspace $ws4
bindsym $mod+Shift+KP_Begin move container to workspace $ws5

# Move focused container to workspace on the side monitor

bindsym $mod+Shift+Mod1+KP_End move container to workspace $ws6
bindsym $mod+Shift+Mod1+KP_Down move container to workspace $ws7
bindsym $mod+Shift+Mod1+KP_Next move container to workspace $ws8
bindsym $mod+Shift+Mod1+KP_Left move container to workspace $ws9
bindsym $mod+Shift+Mod1+KP_Begin move container to workspace $ws10


# With shift you need to use the name, not the number of the numpad key
# KP_1 = KP_End
# KP_2 = KP_Down
# KP_3 = KP_Next
# KP_4 = KP_Left
# KP_5 = KP_Begin
# KP_6 = KP_Right
# KP_7 = KP_Home
# KP_8 = KP_Up
# KP_9 = KP_Prior
# KP_0 = KP_Insert
